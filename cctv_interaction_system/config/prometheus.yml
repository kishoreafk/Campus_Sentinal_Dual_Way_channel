# CCTV Interaction Recognition System — Prometheus config

global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: "cctv-api"
    static_configs:
      - targets: ["api:8000"]
    metrics_path: /metrics

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
